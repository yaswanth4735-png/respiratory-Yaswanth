<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8F3FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="760" rx="28" fill="url(#sky)"/>

  <!-- soft sun -->
  <circle cx="950" cy="150" r="70" fill="#FDE68A" opacity="0.75"/>
  <circle cx="950" cy="150" r="110" fill="#FDE68A" opacity="0.25"/>

  <!-- hills -->
  <path d="M0 520 C140 430 260 430 420 510 C570 585 700 595 860 520 C1010 450 1100 455 1200 520 V760 H0 Z" fill="url(#ground)"/>
  <path d="M0 560 C170 480 290 480 450 560 C610 640 760 655 920 585 C1060 525 1120 530 1200 575 V760 H0 Z" fill="#BBF7D0" opacity="0.85"/>

  <!-- fields -->
  <g opacity="0.9">
    <path d="M60 640 C240 570 400 570 580 640" stroke="#86EFAC" stroke-width="18" stroke-linecap="round"/>
    <path d="M120 690 C320 615 500 615 700 690" stroke="#4ADE80" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
    <path d="M520 650 C700 580 860 580 1040 650" stroke="#86EFAC" stroke-width="18" stroke-linecap="round"/>
    <path d="M560 700 C760 625 940 625 1140 700" stroke="#4ADE80" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- dashboard card -->
  <g filter="url(#shadow)">
    <rect x="180" y="180" width="520" height="270" rx="20" fill="#FFFFFF"/>
    <rect x="210" y="215" width="200" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="210" y="245" width="280" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="210" y="290" width="440" height="18" rx="9" fill="#DCFCE7"/>
    <rect x="210" y="325" width="390" height="18" rx="9" fill="#BBF7D0"/>
    <rect x="210" y="360" width="420" height="18" rx="9" fill="#86EFAC"/>

    <!-- small chart -->
    <rect x="520" y="215" width="130" height="90" rx="14" fill="#F1F5F9"/>
    <path d="M535 290 L560 265 L590 275 L615 245 L640 255" stroke="#22C55E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="560" cy="265" r="6" fill="#16A34A"/>
    <circle cx="615" cy="245" r="6" fill="#16A34A"/>
  </g>

  <!-- leaf badge -->
  <g filter="url(#shadow)">
    <circle cx="770" cy="320" r="78" fill="#FFFFFF"/>
    <path d="M770 366 C814 330 830 286 820 248 C781 247 741 270 716 303 C694 333 704 355 726 366 C743 374 756 373 770 366 Z" fill="url(#leaf)"/>
    <path d="M742 368 C755 334 777 300 810 270" stroke="#14532D" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- caption pills -->
  <g opacity="0.95">
    <rect x="740" y="430" width="220" height="44" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="770" y="458" font-family="Inter, Arial" font-size="16" fill="#0F172A">Random Forest</text>
    <rect x="740" y="485" width="220" height="44" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="770" y="513" font-family="Inter, Arial" font-size="16" fill="#0F172A">SHAP explanation</text>
  </g>
</svg>

