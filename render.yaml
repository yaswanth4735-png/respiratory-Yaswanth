services:
  # 1) Python FastAPI ML service
  - type: web
    name: crop-ml-api
    env: python
    plan: free
    buildCommand: pip install -r backend/ml_service/requirements.txt
    startCommand: uvicorn backend.ml_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Set these in Render dashboard (do NOT commit secrets)
      - key: GEMINI_API_KEY
        sync: false
      - key: AGMARKET_API_URL
        sync: false
      - key: AGMARKET_API_KEY
        sync: false
      - key: AGMARKET_API_KEY_HEADER
        value: x-api-key

  # 2) Node.js web + API gateway (serves frontend and proxies /predict to Python)
  - type: web
    name: crop-web
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/web_server.js
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      # After crop-ml-api is deployed, set this to its public URL, e.g.
      # https://crop-ml-api-xxxx.onrender.com
      - key: PYTHON_API_URL
        sync: false
